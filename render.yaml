services:
  - type: web
    name: whatsapp-acquisition-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AIRTABLE_API_KEY
        sync: false
      - key: AIRTABLE_BASE_ID
        sync: false
      - key: AIRTABLE_TABLE_NAME
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      # ── Phase 7: Postgres migration ──
      - key: DATABASE_URL
        sync: false
      - key: MIGRATION_MODE
        value: airtable   # airtable | dual | postgres
      # ── Phase 8: Multi-tenant ──
      - key: CLIENT_ID
        value: 1          # override per Render service for each new client
      - key: FOLLOWUP_TEMPLATE_NAME
        sync: false       # set once Meta approves the follow-up template
      # ── Dashboard API ──
      - key: DASHBOARD_API_KEY
        sync: false       # secret key; frontend sends as X-API-Key header
      - key: FRONTEND_URL
        sync: false       # e.g. https://your-dashboard.vercel.app (for CORS)
