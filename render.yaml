services:
  - type: web
    name: whatsapp-acquisition-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # ── 9Router LLM gateway ──
      - key: NINEROUTER_API_KEY
        sync: false
      - key: NINEROUTER_BASE_URL
        value: "http://13.234.20.175:20128/v1"
      - key: NINEROUTER_MODEL
        value: "wa-leadgen-backend-fallback-chain"
      - key: AIRTABLE_API_KEY
        sync: false
      - key: AIRTABLE_BASE_ID
        sync: false
      - key: AIRTABLE_TABLE_NAME
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      # ── Phase 7: Postgres migration ──
      - key: DATABASE_URL
        sync: false
      - key: MIGRATION_MODE
        value: dual       # airtable | dual | postgres
      # ── Phase 8: Multi-tenant ──
      - key: CLIENT_ID
        value: 1          # override per Render service for each new client
      - key: FOLLOWUP_TEMPLATE_NAME
        sync: false       # set once Meta approves the follow-up template
      # ── Dashboard API ──
      - key: DASHBOARD_API_KEY
        sync: false       # secret key; frontend sends as X-API-Key header
      # ── F6: Admin onboarding ──
      - key: ADMIN_SECRET
        sync: false       # secret for POST /api/admin/clients
      - key: FRONTEND_URL
        sync: false       # e.g. https://your-dashboard.vercel.app (for CORS)
      # ── Sprint 6: JWT auth ──
      - key: JWT_SECRET
        sync: false       # shared signing secret between backend and frontend
      # ── Sprint 6: Razorpay billing ──
      - key: RAZORPAY_KEY_ID
        sync: false       # Razorpay API key (test: rzp_test_xxx / live: rzp_live_xxx)
      - key: RAZORPAY_KEY_SECRET
        sync: false       # Razorpay API secret — never log or expose
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false       # Razorpay webhook signing secret
      - key: RAZORPAY_PLAN_ID_BASE
        sync: false       # plan_xxx for Base tier (run setup_plans() once to create)
      - key: RAZORPAY_PLAN_ID_AGENCY
        sync: false       # plan_xxx for Agency tier (run setup_plans() once to create)
